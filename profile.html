<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css"
        integrity="sha384-B0vP5xmATw1+K9KRQjQERJvTumQW0nPEzvF6L/Z6nronJ3oUOFUFpCjEUQouq2+l" crossorigin="anonymous">

    <title>Profile</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Nav-bar Start -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-nav">
        <div class="container-fluid">
            <div class="d-inline-block px-2 py-2">
                <a href="./index.html" target="_blank" rel="noopener noreferrer"><img
                        src="./01_Netflix_Logo/03_Netflix_Logo_PMS/Netflix_Logo_PMS.png" width="100" height="60"
                        class="img-fluid" alt=""></a>

            </div>

        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-12">
                <h1>Edit Profile</h1>
                <hr>
            </div>

            <div class="col-4 col-xs-4 col-sm-4 col-md-4 col-lg-4 col-xl-4">
                <img class="img-fluid" id="profilePic"
                    src="https://i.pinimg.com/236x/64/5a/97/645a97899b437f047f4f88bee2e7755c.jpg">
                <img id="editIcon" src="edit-round.png" width="20px">
            </div>
            <div class="col-8 col-xs-8 col-sm-8 col-md-8 col-lg-8 col-xl-8">
                <input id="nameInput" type="text">
                <br>
                <label id="languageLabel" for="languages">Language:</label>
                <br>
                <select id="languages" name="languages" size="4" multiple>
                    <option value="English">English</option>
                    <option value="Spanish">Spanish</option>
                    <option value="French">French</option>
                    <option value="Russian">Russian</option>
                </select>
            </div>

            <div class="offset-4 col-8">
                <hr>
                <h6>Maturity Settings:</h6>
                <button id="maturityButton">ALL MATURITY RATINGS</button>
                <p>Show titles of all maturity ratings for this profile.</p>
                <button id="editButton">EDIT</button>
                <hr>
            </div>

            <div class="offset-4 col-8">
                <h6>Autoplay controls:</h6>
                <input id="checkbox" type="checkbox">
                <p id="checkboxText">Autoplay next episode in a series on all devices.</p>
                <br>
                <input id="checkbox" type="checkbox">
                <p id="checkboxText">Autoplay previews while browsing on all devices.</p>
            </div>
            <div class="col-12">
                <hr>
            </div>
            <div class="col-3">
                <button id="lightButton">SAVE</button>
            </div>
            <div class="col-4">
                <button id="darkButton">CANCEL</button>
            </div>
            <div class="col-5">
                <button id="darkButton">DELETE PROFILE</button>
            </div>
        </div>
    </div>

    <footer>~</footer>



    <!-- Optional JavaScript; choose one of the two! -->

    <!-- Option 1: jQuery and Bootstrap Bundle (includes Popper) -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
        integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-Piv4xVNRyMGpqkS2by6br4gNJ7DXjqk09RmUpJ8jgGtD7zP9yug3goQfGII0yAns"
        crossorigin="anonymous"></script>

    -->
</body>

</html>
